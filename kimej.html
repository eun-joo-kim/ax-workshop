전 세대를 아우르는 디지털·AI 기술 교육 생태계를 설계하고 확산해온 11년 차 교육사업 전문가입니다.
현재 모두의연구소 B2B 교육 부서에서 강남·대전 플랫폼을 총괄하며, 단순 지식 전달을 넘어 '삶을 변화시키는 경험'으로서의 교육을 실현하고 있습니다. 지난 한 해 동안 강남 3,700명, 대전 1,000명의 교육생을 배출하며, 양적 성장과 질적 내실을 동시에 입증했습니다.

저의 HRD 커리어는 한성대학교에서 연 100억 원 규모의 국가장학 사업을 전담하며 시작되었습니다. '사람의 기회를 설계하는 일'의 가치를 깨닫고, 이 후 5년간 고용노동부 사업을 운영하며 B2B HRD 컨설팅을 하며 기업과 사람을 잇는 교육 생태계를 구축했습니다. 그 과정에서 성과 평가 S등급 1회 및 A등급 4회 달성, 서울·경기권 대학 성과 1위라는 지표를 기록했습니다.

그동안 축적한 AI 교육 대중화의 전문성을 발판 삼아, 기존 사업의 고도화는 물론 신규 비즈니스 모델의 수익화를 주도하겠습니다. 입사 후에는 빠르게 조직에 융화되어 현안을 파악하고, 필요한 전문성을 적극적으로 보완하여 실질적인 비즈니스 임팩트를 만들겠습니다. 교육생과 기업의 성장을 리딩하는 교육 사업 전문가로서 귀사와 함께 장기적인 성장을 일구어 나가겠습니다. 감사합니다.`}]},Xf=[{num:"01",tocTitle:"LG전자  전사적 AI 전환(AX) 가속화를 위한 인재 육성 교육",category:"B2B 교육 컨설팅",company:"LG전자",period:"2025~2026",tags:["PM","기획 및 운영 총괄"],title:"전사적 AI 전환(AX) 가속화를 위한 인재 육성 교육",background:"글로벌 AI 기술의 급격한 확산에 대응하여, LG전자는 미래 경쟁력 확보를 위한 '임직원 AI 역량 내재화'를 최우선 전략 과제로 설정함. 그러나 직무 및 부서별로 AI 리터러시 수준의 격차가 존재함에 따라, 기존의 일률적인 교육 방식에서 벗어나 실질적인 퍼포먼스 향상을 이끌어낼 수 있는 정교한 육성 체계의 필요성이 대두됨.",purpose:"이에 따라 임직원 간의 AI 활용 역량 편차를 해소하고, 직무 특성 및 개인별 숙련도를 고려한 '맞춤형 AI 교육 체계'를 기획함. 본 프로젝트는 전사적인 AI Transformation(AX) 가속화를 목표로 하며, 실무 밀착형 교육 콘텐츠와 단계별 로드맵을 통해 전 구성원이 AI를 도구가 아닌 비즈니스 해결책으로 활용할 수 있는 지속 가능한 혁신 기반을 구축함.",myRole:[{title:"전사 DX 역량 상향 평준화를 위한 수준별 학습 로드맵 수립",desc:"임직원 대상 사전 수요조사 결과를 분석하여, 개별 직무 특성과 디지털 숙련도에 최적화된 수준별 교육 과정(초급/중급/고급)을 맵핑함. 이를 통해 학습자별 역량 간극을 해소하고, 실질적인 직무 전환 및 기술 내재화가 가능한 단계별 맞춤형 육성 로드맵을 구축함."},{title:"직무 전문성 강화 및 외연 확장을 위한 직군별 T자형 육성 로드맵 수립",desc:"전사 7개 주요 직군을 대상으로 직무 전문성과 디지털 기술의 확장성을 결합한 'T자형 인재' 육성 경로를 설계함. 각 직군별 업무 특성을 고려하여 필수 핵심 역량을 새롭게 정의하고, 이를 달성하기 위한 단계별 모듈형 커리큘럼을 개발함으로써 현업 적용성이 극대화된 커스터마이징 학습 로드맵을 구축함."},{title:"대규모 교육의 안정적 수행을 위한 통합 운영 가이드라인 수립",desc:"연간 3,000명 이상의 대규모 교육을 안정적으로 수행하기 위해 분야별 전문 강사 풀을 확보하고 최적의 교육 관리 시스템을 가동함. 특히, 교육 질 저하를 방지하고자 다각도의 품질 관리 프로세스를 주도하여 전사 교육의 일관성과 높은 학습 완성도를 상시 유지함."},{title:"업무 생산성 극대화를 위한 AI 툴 통합 커리큘럼 설계",desc:"ChatGPT, Claude, Gemini 등 LLM부터 Midjourney와 같은 이미지 생성 도구, 그리고 n8n, Make 등 업무 자동화 툴을 아우르는 통합 교육과정을 설계함. 단순 기능 습득을 넘어 각 도구를 유기적으로 연계한 실무 시나리오를 구성함으로써, 임직원의 디지털 도구 활용 능력을 비약적으로 제고하고 실제 현업의 생산성 혁신을 실현함."}],results:[{title:"대규모 교육 운영의 안정적 수행 및 목표 달성",desc:"연간 누적 교육 인원 3,000여 명을 달성하며 대규모 인원을 대상으로 한 고품질 DX 교육 운영 프로세스를 성공적으로 안착시키고 시스템적 안정성을 확보함."},{title:"직군·수준별 맞춤형 교육 체계 완성",desc:"전사 임직원의 직무 특성과 숙련도를 고려한 맞춤형 커리큘럼 설계 및 운영을 완료하여, 전 구성원의 디지털 역량을 상향 평준화하고 현업 적용도를 비약적으로 높임."},{title:"전사 AX 가속화를 위한 중장기 로드맵 수립",desc:"단기 교육에 그치지 않고 그룹 전체의 AX(AI 전환) 가속화를 뒷받침할 '중장기 인재 육성 로드맵'을 수립함으로써, 전사 AI 역량 강화의 체계적인 기틀을 마련함."},{title:"지속 가능한 AX 교육 인프라 구축",desc:"중장기 AX 전략과 유기적으로 연계된 지속 가능한 교육 운영 인프라를 구축하여, 급변하는 기술 환경 속에서도 끊임없이 혁신 동력을 공급할 수 있는 학습 생태계를 조성함."}],hasLGDetail:!0},{num:"02",tocTitle:"NICE그룹  전 계열사 AI 내재화를 위한 직무별 실무 자동화 워크숍",category:"B2B 교육 컨설팅",company:"나이스그룹",period:"2025, 2026",tags:["PM","기획 및 운영 총괄"],title:"전 계열사 AI 내재화를 위한 직무별 실무 자동화 워크숍",background:"나이스그룹은 금융·데이터 기반의 비즈니스 특성상, 업무 자동화와 데이터 활용 역량이 기업 경쟁력을 결정짓는 핵심 요소임. 그러나 전 계열사에 걸쳐 임직원의 AI 활용 수준과 디지털 전환(DT) 역량의 편차가 존재함에 따라, 특히 DT 전문 부서와 일반 직군 간의 역량 격차를 해소하고 그룹 전반의 디지털 상향 평준화를 실현하는 것이 시급한 과제로 대두됨.",purpose:"이에 따라 나이스그룹 13개 계열사 임직원을 대상으로, DT 부서의 기술 전문성 고도화와 일반 직군의 실무 AI 활용 역량 강화를 동시에 추진하는 'Two-Track 육성 프로그램'을 기획함. 본 프로젝트는 각 직무 특성에 최적화된 맞춤형 교육을 통해 그룹 내 디지털 혁신 동력을 확보하고, 데이터 기반의 일하는 방식을 전사적으로 확산하는 데 목적을 둠.",myRole:[{title:"그룹 차원의 AX 확산을 위한 맞춤형 육성 체계 구축",desc:"그룹 내 13개 계열사를 대상으로 각 조직의 기능과 목적에 최적화된 Two-Track 교육 모델을 설계함. DT 부서 대상의 특화 교육과 전사 임직원 대상의 AI 리터러시 및 활용 교육을 병행하여 추진함. 특히, 일회성 교육에 그치지 않도록 실제 현업 과제와 연계된 '미션 기반의 AI 워크북'을 도입함으로써 교육 내용이 실질적인 비즈니스 성과로 이어지는 실천적 학습 생태계를 조성함."},{title:"교육 성과 내재화를 위한 맞춤형 워크북 개발",desc:"기획, 마케팅, 영업 직군별 실무자가 직면한 핵심 페인 포인트를 분석하여, 이를 AI로 해결할 수 있는 맞춤형 워크북을 제작함. 교육 수료가 실제 현업의 변화로 이어질 수 있도록 5일간의 단계별 마이크로 미션(Micro-mission)을 설계함. 학습자가 전 과정의 수행 결과와 통찰을 체계적으로 기록하고 제출할 수 있는 성과 관리 로드맵을 구축하여, 교육의 실무 내재화를 극대화함."},{title:"업무 자동화 실현을 위한 DT 부서 특화 과정 운영",desc:"DT 부서 임직원의 기술적 전문성을 제고하기 위해 n8n 기반의 노코드(No-code) 자동화 도구 활용 교육을 수행함. 단순 도구 학습을 넘어 실제 업무 프로세스를 자동화할 수 있는 실무 밀착형 워크북을 제작·배포하여 학습과 현업의 간극을 최소화함. 특히, 실질적인 자동화 성과 도출을 위해 전 과정을 기록하고 결과물을 증빙하는 단계적 로드맵을 구축함으로써, 현업 즉시 적용 및 기술 내재화 수준을 비약적으로 향상함."},{title:"우수 사례 발굴을 통한 AI 활용 문화 확산 및 성과 환류 체계 구축",desc:"워크북을 활용하여 도출된 AI 아이디어가 실제 업무 혁신으로 이어지도록 시간 절감, 실용성, 새로운 시도의 3대 핵심 평가 지표를 수립함. 이를 기반으로 우수 사례를 선정하여 시상을 진행함으로써 임직원의 참여 동기를 고취함. 단순 교육 수료를 넘어 실제 현업 내 AI 내재화를 적극적으로 유도하고, 혁신 성과를 전사적으로 확산하는 선순환 체계를 구축함."}],results:[{title:"전사적 수준별 AI 교육 인프라 완비",desc:"13개 전 계열사 임직원을 대상으로 직무와 숙련도에 최적화된 수준별 AI 교육 체계를 구축하고, 안정적인 운영을 통해 그룹 차원의 디지털 역량을 상향 평준화함."},{title:"실무 내재화 구조 설계 및 실행",desc:"'교육-미션-사례 제출'이 유기적으로 연결된 5일간의 실무 내재화 프로세스를 설계함. 이를 통해 일회성 학습을 넘어 실제 업무 현장에서 AI가 구동되는 실천적 교육 모델을 성공적으로 안착시킴."},{title:"직무별 맞춤 미션북을 통한 즉각적 업무 혁신",desc:"기획·마케팅·영업 등 각 직무의 특수성을 반영한 전용 미션북을 제작·배포하여, 참가자들이 학습 직후 자신의 업무 프로세스에 AI를 즉시 적용할 수 있도록 유도함."}]},{num:"03",tocTitle:"TikTok(TRAE)  비개발자를 위한 No-code 해커톤 기획",category:"해커톤 운영",company:"TikTok (TRAE)",period:"2026",tags:["PM","기획 및 운영 총괄"],title:"비개발자를 위한 No-code 해커톤 기획",background:"AI 기술의 대중화와 더불어 코딩 지식 없이도 서비스·앱을 구현할 수 있는 인프라가 확충됨에 따라, 특정 목적을 수행하는 'AI 에이전트(Agent)'에 대한 사회적·산업적 관심이 극대화됨. 이에 기술적 진입 장벽으로 인해 아이디어 구현에 한계를 겪던 비전문가들에게 실질적인 개발 경험을 제공할 수 있는 모델이 필요함.",purpose:"TikTok에서 자체 개발한 AI 코딩 툴 TRAE를 활용하여, 코딩 지식이 전무한 참가자들도 자신만의 AI 에이전트를 직접 기획하고 실무 수준으로 구현하는 성공 경험을 제공함을 목적으로 함. 이를 통해 AI 툴의 실무 활용 능력을 배양하고, 누구나 기술의 주체가 될 수 있는 'AI 리터러시의 대중화'와 TRAE 기반의 개발 생태계 확산에 기여함.",myRole:[{title:"단기 성과 극대화를 위한 '8시간 Fast-Track' 해커톤 기획 및 운영 총괄",desc:"사전 지식이 없는 비전문가 참가자들도 단기간에 성과를 낼 수 있도록, 아이디어 발굴부터 프로토타입 구현까지 8시간 내 완료하는 'Fast-Track' 커리큘럼을 설계·실행함. 단순 개발을 넘어 평가와 시상까지 연계된 원스톱 프로세스를 구축함. 또한, 참가자 등록 및 체크인부터 최종 시상식에 이르기까지 전 과정의 현장 운영을 총괄하여 고밀도 행사를 안정적으로 완수함."},{title:"참가자 경험 극대화를 위한 창구 일원화 및 최적화",desc:"해커톤 참가자의 편의성을 고려하여 행사 전용 웹페이지를 구축하고, 복잡한 안내 창구를 하나로 통합함. 툴 사용 가이드, 보안 연결 설정, 혜택 지급(14일 무료 이용권) 등 필수 정보를 단일 채널에서 제공하여 참가자의 정보 접근성을 높임. 이를 통해 행사 당일 발생할 수 있는 혼선을 사전에 차단하고, 참가자의 전 여정을 효율적으로 통합 관리함으로써 행사에 집중할 수 있는 최적의 환경을 제공함."},{title:"기술 구현력과 임팩트를 고려한 다각도 성과 평가 체계 구축",desc:"해커톤 산출물의 객관적인 검증을 위해 AI 도구 활용도, 배포 및 구현 가능성, 서비스 임팩트의 3대 핵심 지표를 설정함. 단순 아이디어 제안에 그치지 않고 실제 임팩트를 창출할 수 있는 결과물을 선별하는 데 집중함. 또한, 기술적 완성도를 높이기 위한 멘토링 세션을 운영하여 해커톤 전반의 전문성과 공정성을 확보함."}],results:[{title:"문제 해결형 해커톤 모델의 성공적 안착",desc:"실제 비즈니스와 일상의 난제를 해결하는 문제 해결형 해커톤 구조를 정교하게 설계함. 체계적인 운영을 통해 참가자들의 몰입도를 극대화하며 행사를 성공적으로 완수함."},{title:"비개발자 대상 '원데이 배포' 성공 경험 제공",desc:"코딩 지식이 없는 비전문가들도 당일 안에 실제 배포 가능한 웹 서비스를 완성하는 차별화된 경험을 제공함. 기술적 장벽을 허물고 누구나 AI 서비스를 개발할 수 있다는 자기 효능감을 고취함."},{title:"커뮤니티 확산 및 브랜드 인지도 제고",desc:"성과 발표와 시상식, 네트워킹
