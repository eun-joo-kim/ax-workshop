수립",desc:"연간 3,000명 이상의 대규모 교육을 안정적으로 수행하기 위해 분야별 전문 강사 풀을 확보하고 최적의 교육 관리 시스템을 가동함. 특히, 교육 질 저하를 방지하고자 다각도의 품질 관리 프로세스를 주도하여 전사 교육의 일관성과 높은 학습 완성도를 상시 유지함."},{title:"업무 생산성 극대화를 위한 AI 툴 통합 커리큘럼 설계",desc:"ChatGPT, Claude, Gemini 등 LLM부터 Midjourney와 같은 이미지 생성 도구, 그리고 n8n, Make 등 업무 자동화 툴을 아우르는 통합 교육과정을 설계함. 단순 기능 습득을 넘어 각 도구를 유기적으로 연계한 실무 시나리오를 구성함으로써, 임직원의 디지털 도구 활용 능력을 비약적으로 제고하고 실제 현업의 생산성 혁신을 실현함."}],results:[{title:"대규모 교육 운영의 안정적 수행 및 목표 달성",desc:"연간 누적 교육 인원 3,000여 명을 달성하며 대규모 인원을 대상으로 한 고품질 DX 교육 운영 프로세스를 성공적으로 안착시키고 시스템적 안정성을 확보함."},{title:"직군·수준별 맞춤형 교육 체계 완성",desc:"전사 임직원의 직무 특성과 숙련도를 고려한 맞춤형 커리큘럼 설계 및 운영을 완료하여, 전 구성원의 디지털 역량을 상향 평준화하고 현업 적용도를 비약적으로 높임."},{title:"전사 AX 가속화를 위한 중장기 로드맵 수립",desc:"단기 교육에 그치지 않고 그룹 전체의 AX(AI 전환) 가속화를 뒷받침할 '중장기 인재 육성 로드맵'을 수립함으로써, 전사 AI 역량 강화의 체계적인 기틀을 마련함."},{title:"지속 가능한 AX 교육 인프라 구축",desc:"중장기 AX 전략과 유기적으로 연계된 지속 가능한 교육 운영 인프라를 구축하여, 급변하는 기술 환경 속에서도 끊임없이 혁신 동력을 공급할 수 있는 학습 생태계를 조성함."}],hasLGDetail:!0},{num:"02",tocTitle:"NICE그룹  전 계열사 AI 내재화를 위한 직무별 실무 자동화 워크숍",category:"B2B 교육 컨설팅",company:"나이스그룹",period:"2025, 2026",tags:["PM","기획 및 운영 총괄"],title:"전 계열사 AI 내재화를 위한 직무별 실무 자동화 워크숍",background:"나이스그룹은 금융·데이터 기반의 비즈니스 특성상, 업무 자동화와 데이터 활용 역량이 기업 경쟁력을 결정짓는 핵심 요소임. 그러나 전 계열사에 걸쳐 임직원의 AI 활용 수준과 디지털 전환(DT) 역량의 편차가 존재함에 따라, 특히 DT 전문 부서와 일반 직군 간의 역량 격차를 해소하고 그룹 전반의 디지털 상향 평준화를 실현하는 것이 시급한 과제로 대두됨.",purpose:"이에 따라 나이스그룹 13개 계열사 임직원을 대상으로, DT 부서의 기술 전문성 고도화와 일반 직군의 실무 AI 활용 역량 강화를 동시에 추진하는 'Two-Track 육성 프로그램'을 기획함. 본 프로젝트는 각 직무 특성에 최적화된 맞춤형 교육을 통해 그룹 내 디지털 혁신 동력을 확보하고, 데이터 기반의 일하는 방식을 전사적으로 확산하는 데 목적을 둠.",myRole:[{title:"그룹 차원의 AX 확산을 위한 맞춤형 육성 체계 구축",desc:"그룹 내 13개 계열사를 대상으로 각 조직의 기능과 목적에 최적화된 Two-Track 교육 모델을 설계함. DT 부서 대상의 특화 교육과 전사 임직원 대상의 AI 리터러시 및 활용 교육을 병행하여 추진함. 특히, 일회성 교육에 그치지 않도록 실제 현업 과제와 연계된 '미션 기반의 AI 워크북'을 도입함으로써 교육 내용이 실질적인 비즈니스 성과로 이어지는 실천적 학습 생태계를 조성함."},{title:"교육 성과 내재화를 위한 맞춤형 워크북 개발",link:"https://eun-joo-kim.github.io/ax-workshop/workbook01/",desc:"기획, 마케팅, 영업 직군별 실무자가 직면한 핵심 페인 포인트를 분석하여, 이를 AI로 해결할 수 있는 맞춤형 워크북을 제작함. 교육 수료가 실제 현업의 변화로 이어질 수 있도록 5일간의 단계별 마이크로 미션(Micro-mission)을 설계함. 학습자가 전 과정의 수행 결과와 통찰을 체계적으로 기록하고 제출할 수 있는 성과 관리 로드맵을 구축하여, 교육의 실무 내재화를 극대화함."},{title:"업무 자동화 실현을 위한 DT 부서 특화 과정 운영",desc:"DT 부서 임직원의 기술적 전문성을 제고하기 위해 n8n 기반의 노코드(No-code) 자동화 도구 활용 교육을 수행함. 단순 도구 학습을 넘어 실제 업무 프로세스를 자동화할 수 있는 실무 밀착형 워크북을 제작·배포하여 학습과 현업의 간극을 최소화함. 특히, 실질적인 자동화 성과 도출을 위해 전 과정을 기록하고 결과물을 증빙하는 단계적 로드맵을 구축함으로써, 현업 즉시 적용 및 기술 내재화 수준을 비약적으로 향상함."},{title:"우수 사례 발굴을 통한 AI 활용 문화 확산 및 성과 환류 체계 구축",desc:"워크북을 활용하여 도출된 AI 아이디어가 실제 업무 혁신으로 이어지도록 시간 절감, 실용성, 새로운 시도의 3대 핵심 평가 지표를 수립함. 이를 기반으로 우수 사례를 선정하여 시상을 진행함으로써 임직원의 참여 동기를 고취함. 단순 교육 수료를 넘어 실제 현업 내 AI 내재화를 적극적으로 유도하고, 혁신 성과를 전사적으로 확산하는 선순환 체계를 구축함."}],results:[{title:"전사적 수준별 AI 교육 인프라 완비",desc:"13개 전 계열사 임직원을 대상으로 직무와 숙련도에 최적화된 수준별 AI 교육 체계를 구축하고, 안정적인 운영을 통해 그룹 차원의 디지털 역량을 상향 평준화함."},{title:"실무 내재화 구조 설계 및 실행",desc:"'교육-미션-사례 제출'이 유기적으로 연결된 5일간의 실무 내재화 프로세스를 설계함. 이를 통해 일회성 학습을 넘어 실제 업무 현장에서 AI가 구동되는 실천적 교육 모델을 성공적으로 안착시킴."},{title:"직무별 맞춤 미션북을 통한 즉각적 업무 혁신",desc:"기획·마케팅·영업 등 각 직무의 특수성을 반영한 전용 미션북을 제작·배포하여, 참가자들이 학습 직후 자신의 업무 프로세스에 AI를 즉시 적용할 수 있도록 유도함."}]},{num:"03",tocTitle:"TikTok(TRAE)  비개발자를 위한 No-code 해커톤 기획",category:"해커톤 운영",company:"TikTok (TRAE)",period:"2026",tags:["PM","기획 및 운영 총괄"],title:"비개발자를 위한 No-code 해커톤 기획",background:"AI 기술의 대중화와 더불어 코딩 지식 없이도 서비스·앱을 구현할 수 있는 인프라가 확충됨에 따라, 특정 목적을 수행하는 'AI 에이전트(Agent)'에 대한 사회적·산업적 관심이 극대화됨. 이에 기술적 진입 장벽으로 인해 아이디어 구현에 한계를 겪던 비전문가들에게 실질적인 개발 경험을 제공할 수 있는 모델이 필요함.",purpose:"TikTok에서 자체 개발한 AI 코딩 툴 TRAE를 활용하여, 코딩 지식이 전무한 참가자들도 자신만의 AI 에이전트를 직접 기획하고 실무 수준으로 구현하는 성공 경험을 제공함을 목적으로 함. 이를 통해 AI 툴의 실무 활용 능력을 배양하고, 누구나 기술의 주체가 될 수 있는 'AI 리터러시의 대중화'와 TRAE 기반의 개발 생태계 확산에 기여함.",myRole:[{title:"단기 성과 극대화를 위한 '8시간 Fast-Track' 해커톤 기획 및 운영 총괄",desc:"사전 지식이 없는 비전문가 참가자들도 단기간에 성과를 낼 수 있도록, 아이디어 발굴부터 프로토타입 구현까지 8시간 내 완료하는 'Fast-Track' 커리큘럼을 설계·실행함. 단순 개발을 넘어 평가와 시상까지 연계된 원스톱 프로세스를 구축함. 또한, 참가자 등록 및 체크인부터 최종 시상식에 이르기까지 전 과정의 현장 운영을 총괄하여 고밀도 행사를 안정적으로 완수함."},{title:"참가자 경험 극대화를 위한 창구 일원화 및 최적화",desc:"해커톤 참가자의 :"공연예술 산업 경쟁력 강화를 위한 CRM 데이터 활용 역량 강화 교육 설계",desc:"공연예술 현장의 CRM 데이터 활용 한계를 극복하기 위해 RFP를 심층 분석하여 전략적 교육 모델을 제안하고 최종 사업 수주를 달성함. 교육의 현장 실효성을 극대화하고자 국내외 주요 공연예술 기관의 CRM 도입 현황을 정밀 분석하였으며, 예술 경영 전문가 자문 및 현장 수요조사를 실시함. 이를 바탕으로 티켓 예매 데이터 분석부터 관객 세그먼트별 마케팅 전략까지 아우르는 공연예술 맞춤형 특화 커리큘럼을 정교하게 설계함."},{title:"지역별 역량 격차 해소를 위한 4개 거점 순회 교육 체계 구축",desc:"수도권과 지역 간의 예술 경영 역량 격차를 해소하기 위해 서울, 대전, 부산, 강릉 4개 주요 거점 도시를 직접 방문하여 지역 밀착형 교육을 수행함. 맞춤형 교육을 위해 지역별 공연 시장의 특성과 참가 기관의 디지털 숙련도를 사전에 분석함."},{title:"컨설팅 성과 극대화를 위한 데이터 리터러시 교육 체계 구축",desc:"본 교육은 데이터 컨설팅에 앞서 참가자의 수용성을 높이기 위한 '마중물 교육'으로서, 평소 지방 거점에서 접하기 어려운 공연예술 실무 전문가를 비롯하여 데이터 마케팅, 저작권, 개인정보 분야의 전문가를 배치함. 이를 통해 데이터 리터러시 역량을 선제적으로 함양하고 교육의 당위성을 강조함으로써, 이후 진행될 맞춤형 컨설팅의 실효성을 극대화함."}],results:[{title:"산업 특화 CRM 커리큘럼 설계 및 실무 가이드라인 수립",desc:"공연예술 현장의 티켓 구매 데이터와 구매 성향을 분석하여 산업 특화형 CRM 교육 체계를 설계함. 교육 종료 후에도 현업에서 즉시 활용 가능한 'CRM 실무 가이드라인'을 제작·배포하여 데이터 활용의 표준 프로세스를 제시함."},{title:"전국 단위 거점 교육 운영 및 DX 보유 인력 확보",desc:"서울, 대전, 부산, 강릉 4개 거점 지역을 순회 시행하여 전국 63개 주요 공연시설 소속 97명의 수료생을 배출함. 지역 간 교육 격차를 해소하고 공연예술 분야의 디지털 전문 인력 풀(Pool)을 광범위하게 확보함."},{title:"공연업계 데이터 활용 인식 개선 및 혁신 기반 마련",desc:"보수적이었던 공연예술 업계 내 데이터 활용에 대한 인식을 근본적으로 개선하는 데 성공함. 데이터를 '비즈니스 창출의 핵심 도구'로 재정의하며, 산업 전반의 디지털 전환(DX)을 위한 견고한 토대를 마련함."}]},{num:"06",tocTitle:"GS그룹  신임 임원 DX 마인드셋 및 혁신 리더십 과정 설계 및 운영",category:"C-Level 교육",company:"GS그룹",period:"2024",tags:["PM","기획 및 운영 총괄"],title:"그룹 미래 경쟁력 확보를 위한 신임 임원 DX 마인드셋 및 혁신 리더십 과정",background:"GS그룹 전 계열사 신임 임원을 대상으로 그룹의 미래 성장을 견인할 새로운 역할 정립과 리더십 역량 강화의 필요성이 대두됨. 특히, 급변하는 경영 환경에 대응하기 위해 비즈니스 관점의 디지털 전환(DX) 역량 내재화를 핵심 과제로 설정함.",purpose:"이에 6개 계열사 신임 임원 31명을 대상으로 DX 마인드셋 확립, 고객 중심의 디자인 씽킹(Design Thinking), 생성형 AI 실전 활용 기술 강화를 목적으로 하는 6일 과정의 프리미엄 임원 교육 프로그램을 설계·운영함. 본 과정은 단순 이론 습득을 넘어 현업의 비즈니스 가치를 재창출할 수 있는 실무 밀착형 리더십 육성에 초점을 맞춤.",myRole:[{title:"실전 문제 해결을 위한 DX-Design Thinking 융합 커리큘럼 설계",desc:"GS그룹 HR 부서 및 회장단의 핵심 요구사항을 분석하여, 기술 중심의 DX와 인간 중심의 Design Thinking이 상호 연계된 통합 커리큘럼을 설계함. 특히, 각 교육 모듈이 종료될 때마다 학습 내용을 바탕으로 비즈니스 기회 영역을 지속적으로 재정의하는 누적형 학습 로드맵을 수립하여 교육의 현업 연계성을 극대화함."},{title:"기술 트렌드와 디자인 씽킹을 결합한 생성형 AI 내재화 프로그램 구성",desc:"최신 기술 트렌드 분석 및 콘텐츠화를 바탕으로 생성형 AI의 현업 적용을 위한 맞춤형 실습 과제를 개발함. DX 전용 워크시트와 디자인 씽킹 방법론을 연계한 콘텐츠를 구축하여, 참가자가 실제 업무 시나리오에 따라 문제를 정의하고 AI 솔루션을 도출할 수 있도록 교육 콘텐츠 전반을 입체적으로 구성함."},{title:"DX 성과 확산을 위한 현업 전문가 섭외 및 맞춤형 연수 인프라 설계",desc:"GS 내부에서 DX 성공 사례를 보유한 현업 전문가를 인터뷰 및 강사로 섭외하여 교육의 실효성을 높임. 또한, 교육생의 학습 몰입도를 극대화하기 위해 출퇴근과 숙박이 결합된 하이브리드 운영 과정을 설계함으로써, 단순 교육을 넘어 현업 활용도와 교육 만족도를 동시에 체계적으로 강화함."}],results:[{title:"DX 추진 동력 확보 및 리더십 확립",desc:"신임 임원 31명을 대상으로 그룹 차원의 DX 비전을 공유하고, 점진적 변화 관리를 통해 혁신 리더십과 AI 시대 의사결정의 중요성을 효과적으로 내재화함."},{title:"DX × Design Thinking 융합 액션 러닝 설계",desc:"단순 이론 강의를 탈피하여 DX 기술과 디자인 씽킹 방법론을 결합한 액션 러닝 구조를 채택함. 임원들이 직접 고객 니즈를 발굴하고 구체적인 DX 추진 방안을 수립하는 실무형 산출물 도출 프로세스를 구축함."},{title:"누적형 학습 구조(The DX Canvas) 설계",desc:"모듈별 학습 내용이 단절되지 않도록 'The DX Canvas'를 지속적으로 업데이트하는 누적형 로드맵을 적용함. 이를 통해 학습 내용이 일회성에 그치지 않고 실제 비즈니스 기회 재발견으로 이어지는 연계성을 강화함."},{title:"임원 맞춤형 고밀도 실습 환경 제공",desc:"갤러리 워크 방식의 상호 리뷰와 네트워킹을 도입하여 임원 수준에 부합하는 고품격·고밀도 학습 경험을 제공함. 동료 임원 간의 지식 공유를 활성화하고 협력적 통찰을 도출하는 토대를 마련함."}]},{num:"07",tocTitle:"대전상공회의소  지역 기업 AI 실무 프로세스 혁신 교육 기획",category:"지역 특화 교육",company:"대전상공회의소",period:"2025~2026",tags:["PM","기획 및 운영 총괄"],title:"지역 기업 경쟁력 강화를 위한 AI 실무 프로세스 혁신 교육 기획",background:"AI 기술의 급속한 확산으로 생성형 AI의 실무 도입 필요성은 증대되고 있으나, 대전 지역 기업들은 지리적·운영적 제약으로 인해 양질의 실습 교육 기회와 관련 인프라 확보에 어려움을 겪고 있음. 특히 단순 기술 체득을 넘어 현업에 즉시 적용 가능한 수준의 전문 교육에 대한 갈증이 깊어짐에 따라, 지역 산업 전반의 디지털 격차를 해소하고 실질적인 생산성 혁신을 견인할 교육 모델이 시급히 요구됨.",purpose:"본 사업은 대전상공회의소 주관 하에 회원사를 대상으로 진행되었으며, 임직원의 일상 업무 내 AI 실질적 내재화를 위한 '3개 트랙 기반 맞춤형 과정'으로 기획됨. 전 직군이 참여 가능한 포괄적 커리큘럼을 통해 기술 장벽을 낮추고, '현업 적용'을 최우선 목적으로 설계됨.",myRole:[{title:"실무 워크플로우 연계형 AI/데이터 교육 설계 및 직무 맞춤형 로드맵 수립",desc:"사전 수요 조사를 데이터화하여 AI 비즈니스 기획 / 스마트 워크 / 데이터 리터러시를 3대 핵심 역량으로 정의함. 이를 실현하기 위해 AI 도구 활용 중심의 6개 전문 커리큘럼을 설계하였으며, 이론 위주의 학습에서 탈피하여 실제 업무 흐름(Workflow)에 최적화된 모듈형 구성을 도입함."},{title:"지역 기업 AX 확산을 위한 민·관·산 거버넌스 기반 통합 운영 체계 수립",desc:"대전상공회의소의 회원사 네트워크를 허브로 활용하여 대·중·소기업 임직원 모두가 소외됨 없이 참여할 수 있는
